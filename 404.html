<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Amir Hashmi</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
    <style>
        .error-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: var(--clr-bg);
            padding: var(--space-lg);
            position: relative;
            overflow: hidden;
        }

        .error-content {
            position: relative;
            z-index: 10;
            max-width: 600px;
        }

        .error-code {
            font-family: var(--font-serif);
            font-size: clamp(8rem, 20vw, 12rem);
            font-weight: 700;
            line-height: 1;
            color: var(--clr-gold);
            margin-bottom: 1rem;
            opacity: 0.15;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            white-space: nowrap;
            user-select: none;
            pointer-events: none;
        }

        .error-title {
            font-family: var(--font-serif);
            font-size: clamp(2.5rem, 6vw, 4rem);
            color: var(--clr-white);
            margin-bottom: 1.5rem;
            line-height: 1.1;
        }

        .error-text {
            font-size: 1.1rem;
            color: var(--clr-text-muted);
            margin-bottom: 2.5rem;
            line-height: 1.8;
        }

        .error-decoration {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .error-circle {
            position: absolute;
            width: 400px;
            height: 400px;
            background: var(--clr-gold-glow);
            filter: blur(100px);
            border-radius: 50%;
            opacity: 0.3;
        }

        .circle-1 { top: -10%; left: -5%; }
        .circle-2 { bottom: -15%; right: -5%; }
    </style>
</head>
<body>
    <main class="error-page">
        <div class="error-decoration">
            <div class="error-circle circle-1"></div>
            <div class="error-circle circle-2"></div>
        </div>

        <div class="error-content reveal visible">
            <div class="error-code">404</div>
            <h1 class="error-title">Lost in the <em>Narrative?</em></h1>
            <p class="error-text">
                The page you're searching for seems to have drifted out of the frame. 
                Let's get you back to the main story.
            </p>
            <div class="error-actions">
                <a href="index.html" class="btn btn-primary">Back to Homepage</a>
            </div>
        </div>
    </main>

    <script>
        // Redirect after 10 seconds (optional)
        /*
        setTimeout(() => {
            window.location.href = 'index.html';
        }, 10000);
        */
    </script>
</body>
</html>
